# Cloudflare Worker config for the roblox-mcp-pro Polar license proxy.
#
#   wrangler secret put POLAR_TOKEN      # Organization Access Token (secret)
#   wrangler deploy
#
# Then set RMP_LICENSE_PROVIDER=polar and RMP_LICENSE_PROXY_URL=<deployed url>
# in your release env / package config.

name = "roblox-mcp-pro-license"
main = "worker.js"
compatibility_date = "2024-11-01"

[vars]
# Your Polar organization UUID (not a secret).
POLAR_ORG_ID = "REPLACE_WITH_POLAR_ORG_ID"
# Optional: pin to one product's benefit so only its keys validate.
# POLAR_BENEFIT_ID = "REPLACE_WITH_BENEFIT_ID"
# Optional: use the sandbox while testing.
# POLAR_API_BASE = "https://sandbox-api.polar.sh"

# POLAR_TOKEN is set via `wrangler secret put POLAR_TOKEN`, never in this file.
