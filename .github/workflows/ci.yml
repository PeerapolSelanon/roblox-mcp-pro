name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install deps
        run: npm ci

      - name: Lint TypeScript (biome)
        run: npm run lint

      - name: Build server (tsc, strict)
        run: npm run build

      - name: Smoke test (tool registry)
        run: node scripts/smoke.mjs

      - name: License gate test (trial + offline grace)
        run: node scripts/license-smoke.mjs

      - name: Routing test (fail-closed multi-place)
        run: node scripts/routing-smoke.mjs

      - name: Sync mirror test (disk materialization)
        run: node scripts/sync-smoke.mjs

      - name: Analyze parser test (Luau diagnostics)
        run: node scripts/analyze-smoke.mjs

      - name: Unit tests (bridge session lifecycle)
        run: npx tsx --test test/*.test.ts

      - name: Tool docs up to date
        run: |
          npm run docs
          git diff --exit-code -- .agents/skills/roblox-mcp-pro/references/tools.md \
            || { echo "::error::tools.md is stale — run 'npm run docs' and commit the result."; exit 1; }

      - name: Setup Roblox toolchain (rojo, selene)
        uses: ok-nick/setup-aftman@v0.4.2

      - name: Lint plugin Luau (selene)
        run: |
          selene generate-roblox-std
          selene plugin/src

      - name: Build Studio plugin
        run: |
          cd plugin
          rojo build default.project.json --output /tmp/RobloxMcpPro.rbxmx
