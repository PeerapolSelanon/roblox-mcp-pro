name: Release

# Push a version tag to cut a release:
#   npm version patch        # bumps package.json + creates a vX.Y.Z tag
#   git push --follow-tags
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed to create the GitHub Release and upload assets

jobs:
  plugin:
    name: Build plugin & publish GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Rojo
        uses: ok-nick/setup-aftman@v0.4.2

      - name: Build Studio plugin
        run: |
          cd plugin
          rojo build default.project.json --output RobloxMcpPro.rbxmx

      - name: Create / update GitHub Release with the plugin artifact
        # Use the gh CLI (pre-installed on the runner) instead of a third-party
        # JS action, so the release step has no Node-runtime deprecation to chase.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" plugin/RobloxMcpPro.rbxmx --clobber
          else
            gh release create "$tag" plugin/RobloxMcpPro.rbxmx --generate-notes
          fi

  npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Rojo
        uses: ok-nick/setup-aftman@v0.4.2

      - name: Build Studio plugin (so RobloxMcpPro.rbxmx ships in the npm package)
        run: |
          cd plugin
          rojo build default.project.json --output RobloxMcpPro.rbxmx

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install deps
        run: npm ci

      - name: Publish
        # Requires an NPM_TOKEN repo secret. Until it is set this job will fail
        # while the plugin Release above still succeeds.
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
